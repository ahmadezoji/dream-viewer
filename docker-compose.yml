services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # URL the browser uses to reach the backend (host-published port).
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "8081:80"
    depends_on:
      - backend
